services:
  detector:
    build: .
    env_file: ".env"
    container_name: deadbolt-detector
    ports:
      - "5001:5000"      # WebUI access
    environment:
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=1883
      - MQTT_TOPIC=home/deadbolt/state
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASS=${MQTT_PASS:-}
      - CAMERA_URL=${CAMERA_URL}
      - REF_LOCKED=/app/config/locked.jpg
      - REF_UNLOCKED=/app/config/unlocked.jpg
      - FLASK_PORT=5000
      - DETECTOR_DEBUG=1
      - REFRESH_RATE=${REFRESH_RATE:-5}    # Camera poll interval in seconds (default: 5)
    volumes:
      - ./config:/app/config
    restart: unless-stopped
